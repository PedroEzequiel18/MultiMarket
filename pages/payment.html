<div class="payment-header">
    <button onclick="history.back()" class="back-btn">←</button>
    <h1>Pagamento</h1>
</div>

<div id="produtos-pagamento"></div>  

<div class="payment">
    <h2>Método de pagamento</h2>
    <div class="option" data-method="pix">
        <i class="fa-brands fa-pix option-icon"></i>
        <span>Pix</span>
    </div>
    <div class="option" data-method="card">
        <i class="fas fa-credit-card option-icon"></i>
        <span>Cartão de Crédito</span>
    </div>
    <div class="option" data-method="boleto">
        <i class="fas fa-barcode option-icon"></i>
        <span>Boleto</span>
    </div>
</div>

<div class="footer-payment">
    <span class="total-label">TOTAL: R$ 0,00</span>
    <button class="pay-button">Fazer Pedido</button>
</div>
