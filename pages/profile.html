<div class="profile-page">

  <main class="profile-main">
    <section class="profile-card">

      <!-- Avatar -->
      <div class="profile-avatar-wrap">
        <img src="../src/assets/icons/perfil.svg" class="profile-avatar">
      </div>

      <h1 class="profile-name">PERFIL DE JHON</h1>

      <form class="profile-form">

        <!-- ID -->
        <div class="profile-field">
          <label>ID</label>
          <div class="input-wrapper">
            <input type="text" value="1" readonly>
            <img src="src/assets/icons/edit.svg" class="edit-icon">
          </div>
        </div>

        <!-- Username -->
        <div class="profile-field">
          <label>USERNAME</label>
          <div class="input-wrapper">
            <input type="text" value="Jhon" readonly>
            <img src="src/assets/icons/edit.svg" class="edit-icon">
          </div>
        </div>

        <!-- Email -->
        <div class="profile-field">
          <label>E-MAIL</label>
          <div class="input-wrapper">
            <input type="email" value="jhon@mail.com" readonly>
            <img src="src/assets/icons/edit.svg" class="edit-icon">
          </div>
        </div>

        <!-- Password -->
        <div class="profile-field">
          <label>PASSWORD</label>
          <div class="input-wrapper">
            <input type="password" value="12345678" readonly>
            <img src="src/assets/icons/edit.svg" class="edit-icon">
          </div>
        </div>

        <!-- Role -->
        <div class="profile-field">
          <label>ROLE</label>
          <div class="input-wrapper">
            <input type="text" value="customer" readonly>
            <img src="src/assets/icons/edit.svg" class="edit-icon">
          </div>
        </div>

      </form>

      <!-- Botões -->
      <div class="profile-actions">
        <button class="btn confirm">CONFIRMAR</button>
        <button onclick="doLogout()" class="btn logout">SAIR</button>
      </div>

    </section>
  </main>

</div>
